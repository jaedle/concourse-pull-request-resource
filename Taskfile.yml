version: "3"

tasks:

  world:
    desc: "run all local verifications"
    cmds:
      - task: install
      - task: build
      - task: type-check
      - task: lint
      - task: test
      - task: build-docker-image

  install:
    desc: Install dependencies
    cmd: npm ci
    sources: [ package-lock.json ]

  build:
    desc: Transpile
    deps: [ clean ]
    cmd: npx tsc

  build-docker-image:
    desc: Build the Docker image
    deps: [ build ]
    cmd: docker build -t concourse-pull-request-resource:local .

  clean: rm -rf dist/

  type-check:
    desc: Perform type checks
    cmd: npx tsc --noEmit

  test:
    desc: Run tests
    deps: [ lint ]
    cmd: npx vitest run

  lint:
    desc: Lint and format check
    cmd: npx biome check src/

  check-local:
    desc: "Run the check command locally (reads JSON from stdin). Usage: echo '<json>' | task check-local"
    cmds:
      - node dist/check-entry.js

  get-local:
    desc: "Run the get command locally. Usage: echo '<json>' | task get-local -- <destination-dir>"
    cmds:
      - node dist/get-entry.js {{.CLI_ARGS}}
